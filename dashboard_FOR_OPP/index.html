<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Opportunità Formazione GOL - Qualifica Group</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/tables.css">
  <link rel="stylesheet" href="css/modal.css">
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-brand"><h2>Qualifica Group</h2><p>Opportunità Formazione GOL</p></div>
  <div class="nav-group">
    <div class="nav-group-label">Overview</div>
    <a class="nav-item active" data-sec="executive" onclick="showSec('executive')"><span class="nav-icon">&#9632;</span>Executive Summary</a>
    <a class="nav-item" data-sec="pipeline" onclick="showSec('pipeline')"><span class="nav-icon">&#8364;</span>Pipeline</a>
  </div>
  <div class="nav-group">
    <div class="nav-group-label">Analisi</div>
    <a class="nav-item" data-sec="corsi" onclick="showSec('corsi')"><span class="nav-icon">&#9654;</span>Corsi</a>
    <a class="nav-item" data-sec="cpi" onclick="showSec('cpi')"><span class="nav-icon">&#9673;</span>CPI</a>
    <a class="nav-item" data-sec="operatori" onclick="showSec('operatori')"><span class="nav-icon">&#9881;</span>Operatori</a>
    <a class="nav-item" data-sec="rendicontazione" onclick="showSec('rendicontazione')"><span class="nav-icon">&#9776;</span>Rendicontazione</a>
  </div>
  <div class="nav-group">
    <div class="nav-group-label">Stato</div>
    <a class="nav-item" data-sec="alert" onclick="showSec('alert')"><span class="nav-icon">&#9888;</span>Alert</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="main">
  <div class="header">
    <div>
      <h1>Dashboard Opportunità Formazione GOL</h1>
      <div class="header-sub">Qualifica Group &middot; Agg. 13 Aprile 2026 &middot; <span id="hdrCount"></span> opportunità</div>
    </div>
  </div>

  <!-- Global Filters -->
  <div class="filters">
    <div class="filter-group"><label>Status</label><div class="ms-wrap" id="fStatus"></div></div>
    <div class="filter-group"><label>Stato Preventivo</label><div class="ms-wrap" id="fStatoPrev"></div></div>
    <div class="filter-group"><label>Corso</label><div class="ms-wrap" id="fCorso"></div></div>
    <div class="filter-group"><label>Tipologia</label><div class="ms-wrap" id="fTipo"></div></div>
    <div class="filter-group"><label>CPI</label><div class="ms-wrap" id="fCpi"></div></div>
    <div class="filter-group"><label>Operatore</label><div class="ms-wrap" id="fOp"></div></div>
    <div class="filter-group"><label>Rendicontazione</label><div class="ms-wrap" id="fRend"></div></div>
    <button class="filter-reset" onclick="resetFilters()">Reset</button>
  </div>

  <!-- Active Filter Chips -->
  <div id="activeFilters" class="active-filters"></div>

  <!-- Filtered KPIs -->
  <div id="filteredKpis" class="kpi-grid"></div>

  <!-- Sections -->
  <div id="sec-executive"></div>
  <div id="sec-pipeline" class="hidden"></div>
  <div id="sec-corsi" class="hidden"></div>
  <div id="sec-cpi" class="hidden"></div>
  <div id="sec-operatori" class="hidden"></div>
  <div id="sec-rendicontazione" class="hidden"></div>
  <div id="sec-alert" class="hidden"></div>
</main>

<!-- Drill-Down Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Dettaglio</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Scripts -->
<script src="../shared/multiselect.js?v=1"></script>
<script src="js/utils.js?v=1"></script>
<script src="js/tables.js?v=1"></script>
<script src="js/charts.js?v=1"></script>
<script src="js/drilldown.js?v=1"></script>
<script src="js/filters.js?v=1"></script>
<script src="js/kpis.js?v=1"></script>
<script src="js/sections-overview.js?v=1"></script>
<script src="js/sections-opp.js?v=1"></script>
<script src="js/app.js?v=1"></script>

</body>
</html>
