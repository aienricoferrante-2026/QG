<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Offerte - Qualifica Group</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="css/variables.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/tables.css?v=2">
  <link rel="stylesheet" href="css/modal.css?v=2">
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-brand"><h2>Qualifica Group</h2><p>Dashboard Offerte v2</p></div>
  <div class="nav-group">
    <div class="nav-group-label">Overview</div>
    <a class="nav-item active" data-sec="executive" onclick="showSec('executive')"><span class="nav-icon">&#9632;</span>Executive Summary</a>
    <a class="nav-item" data-sec="pipeline" onclick="showSec('pipeline')"><span class="nav-icon">&#8364;</span>Pipeline & Conversione</a>
  </div>
  <div class="nav-group">
    <div class="nav-group-label">Analisi</div>
    <a class="nav-item" data-sec="agenti" onclick="showSec('agenti')"><span class="nav-icon">&#9881;</span>Commerciali</a>
    <a class="nav-item" data-sec="categorie" onclick="showSec('categorie')"><span class="nav-icon">&#9654;</span>Categorie</a>
    <a class="nav-item" data-sec="societa" onclick="showSec('societa')"><span class="nav-icon">&#9673;</span>Societa & Sedi</a>
    <a class="nav-item" data-sec="trend" onclick="showSec('trend')"><span class="nav-icon">&#9660;</span>Trend Temporale</a>
  </div>
  <div class="nav-group">
    <div class="nav-group-label">Dettaglio</div>
    <a class="nav-item" data-sec="tabella" onclick="showSec('tabella')"><span class="nav-icon">&#9776;</span>Tabella Offerte</a>
    <a class="nav-item" data-sec="alert" onclick="showSec('alert')"><span class="nav-icon">&#9888;</span>Alert</a>
  </div>
</nav>

<!-- MAIN CONTENT -->
<main class="main">
  <div class="header">
    <div>
      <h1>Dashboard Offerte</h1>
      <div class="header-sub">Qualifica Group &middot; Agg. 15 Aprile 2026 &middot; <span id="hdrCount"></span> offerte</div>
    </div>
  </div>

  <!-- Global Filters -->
  <div class="filters">
    <div class="filter-group"><label>Status</label><div class="ms-wrap" id="fStatus"></div></div>
    <div class="filter-group"><label>Categoria</label><div class="ms-wrap" id="fCat"></div></div>
    <div class="filter-group"><label>Commerciale</label><div class="ms-wrap" id="fAgente"></div></div>
    <div class="filter-group"><label>Societa</label><div class="ms-wrap" id="fSocieta"></div></div>
    <div class="filter-group"><label>Sede Operativa</label><div class="ms-wrap" id="fSede"></div></div>
    <div class="filter-group"><label>Anno</label><div class="ms-wrap" id="fAnno"></div></div>
    <button class="filter-reset" onclick="resetFilters()">Reset</button>
  </div>

  <!-- Active Filter Chips -->
  <div id="activeFilters" class="active-filters"></div>

  <!-- Filtered KPIs -->
  <div id="filteredKpis" class="kpi-grid"></div>

  <!-- Sections -->
  <div id="sec-executive"></div>
  <div id="sec-pipeline" class="hidden"></div>
  <div id="sec-agenti" class="hidden"></div>
  <div id="sec-categorie" class="hidden"></div>
  <div id="sec-societa" class="hidden"></div>
  <div id="sec-trend" class="hidden"></div>
  <div id="sec-tabella" class="hidden"></div>
  <div id="sec-alert" class="hidden"></div>
</main>

<!-- Drill-Down Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Dettaglio</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Scripts -->
<script src="../shared/multiselect.js?v=1"></script>
<script src="js/utils.js?v=2"></script>
<script src="js/charts.js?v=2"></script>
<script src="js/tables.js?v=2"></script>
<script src="js/drilldown.js?v=1"></script>
<script src="js/filters.js?v=2"></script>
<script src="js/kpis.js?v=2"></script>
<script src="js/sections-overview.js?v=1"></script>
<script src="js/sections-offerte.js?v=1"></script>
<script src="js/app.js?v=2"></script>

</body>
</html>
